services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: atomic_sync
      POSTGRES_USER: atomic_sync
      POSTGRES_PASSWORD: atomic_sync
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
    environment:
      DATABASE_URL: postgres://atomic_sync:atomic_sync@postgres:5432/atomic_sync
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:5174}
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    ports:
      - "5174:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
